<!-- Value Statement Card -->
<section class="mb-12 relative overflow-hidden bg-primary-container hover:bg-primary-container/80
    dark:bg-surface-lowest dark:hover:bg-surface-lowest/80
    p-12 md:p-16 rounded-sm shadow-2xl transition-colors">

    <!-- Background Blur Shapes -->
    <div class="absolute inset-0 opacity-20 pointer-events-none">
        <div class="absolute -right-20 -top-20 w-96 h-96 bg-secondary dark:bg-secondary/70 rounded-full blur-[100px]">
        </div>
        <div
            class="absolute -left-20 -bottom-20 w-96 h-96 bg-primary dark:bg-primary-container/70 rounded-full blur-[100px]">
        </div>
    </div>

    <div class="relative z-10 flex flex-col md:flex-row justify-between items-end gap-8">
        <div class="space-y-2">
            <p class="font-label text-sm md:text-md uppercase tracking-[0.3em]
                text-on-primary-fixed-variant dark:text-on-surface font-bold">
                Dinero en fondos
            </p>
            <h2 class="text-4xl md:text-6xl font-headline font-extrabold
                text-primary dark:text-secondary tracking-tighter">
                {{fondoStore.totalInvertido() | currency}}
            </h2>

        </div>

        <div class="w-full md:w-1/3 h-32 md:h-48 relative">
            <div class="absolute inset-0 flex items-end space-x-2">
                <div class="flex-1 bg-secondary/20 dark:bg-secondary/20 h-[30%] rounded-t-sm"></div>
                <div class="flex-1 bg-secondary/30 dark:bg-secondary/30 h-[45%] rounded-t-sm"></div>
                <div class="flex-1 bg-secondary/40 dark:bg-secondary/40 h-[40%] rounded-t-sm"></div>
                <div class="flex-1 bg-secondary/60 dark:bg-secondary/60 h-[70%] rounded-t-sm"></div>
                <div class="flex-1 bg-secondary/80 dark:bg-secondary/80 h-[85%] rounded-t-sm"></div>
                <div class="flex-1 bg-secondary dark:bg-secondary h-full rounded-t-sm"></div>
            </div>
        </div>
    </div>
</section>
<!-- Grid Layout for Allocation and Participations -->
<div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
    <!-- Participations List (Bento Grid Right) -->
    <div class="lg:col-span-12">

        <div class="flex items-baseline justify-between mb-8">
            <h3 class="text-2xl font-bold text-[var(--primary)] dark:text-[var(--secondary)] tracking-tight">Mis
                movimientos</h3>
        </div>

        <div class="flex flex-col max-h-[100vh] overflow-y-auto gap-3">
            @for (item of fondoStore.transacciones(); track $index) {
            <app-movement-card [data]="item" />
            }
        </div>
    </div>
</div>
