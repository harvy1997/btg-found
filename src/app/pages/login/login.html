<main class="min-h-[100vh] flex items-center justify-center relative overflow-hidden px-6 py-1">

    <div class="w-full max-w-5xl grid lg:grid-cols-2
        bg-surface hover:bg-surface/80
        dark:bg-surface-lowest dark:hover:bg-surface-lowest/80
        editorial-shadow rounded-sm overflow-hidden
        border border-outline-variant/10 transition-colors">

        <!-- Image Section -->
        <div class="relative hidden lg:block overflow-hidden">

            <div class="absolute inset-0 bg-primary/20 backdrop-blur-[2px]"></div>

            <div class="absolute bottom-12 left-12 right-12">
                <h2
                    class="text-display-md text-on-primary font-headline font-extrabold tracking-tighter leading-none mb-2">
                    BTG - Bank
                </h2>

            </div>
        </div>

        <!-- Login Form Section -->
        <div class="p-8 md:p-16 flex flex-col justify-center">
            <div class="mb-12">
                <h1 class="text-4xl font-headline font-bold text-primary dark:text-white tracking-tight">
                    The Private Ledger
                </h1>
            </div>

            <form class="space-y-10 md:space-y-6">
                <div class="group relative">
                    <label class="block text-xs font-label uppercase tracking-widest
                        text-on-surface-variant group-focus-within:text-secondary transition-colors duration-300">
                        Client ID
                    </label>
                    <input class="w-full bg-transparent border-0 border-b border-outline-variant py-3
                        focus:ring-0 focus:border-secondary transition-all font-body text-on-surface"
                        placeholder="Enter your unique identifier" type="text" />
                </div>

                <div class="group relative">
                    <label class="block text-xs font-label uppercase tracking-widest
                        text-on-surface-variant group-focus-within:text-secondary transition-colors duration-300">
                        Secure Password
                    </label>
                    <input class="w-full bg-transparent border-0 border-b border-outline-variant py-3
                        focus:ring-0 focus:border-secondary transition-all font-body text-on-surface"
                        placeholder="••••••••••••" type="password" />
                </div>

                <div class="flex items-center justify-between pt-1">
                    <label class="flex items-center gap-3 cursor-pointer group">
                        <div class="relative flex items-center">
                            <input class="peer hidden" type="checkbox" />
                            <div class="w-5 h-5 border border-outline-variant rounded-sm
                                bg-surface hover:bg-surface/80
                                dark:bg-surface-lowest dark:hover:bg-surface-lowest/80
                                group-hover:border-secondary
                                peer-checked:bg-secondary peer-checked:border-secondary transition-all">
                            </div>
                            <span
                                class="material-symbols-outlined text-[14px] text-on-secondary absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 opacity-0 peer-checked:opacity-100">
                                check
                            </span>
                        </div>
                        <span class="text-sm font-label uppercase tracking-wider text-on-surface-variant">
                            Remember device
                        </span>
                    </label>

                    <a class="text-xs font-label uppercase tracking-widest
                        text-secondary hover:text-primary transition-colors" href="#">
                        Forgot Password
                    </a>
                </div>

                <div class="flex justify-center">
                    <button class="w-fit bg-primary text-primary p-3 rounded-sm
                    font-headline font-bold tracking-widest uppercase text-sm
                    hover:bg-primary/80 dark:hover:bg-primary/70 text-white
                    transition-all duration-300 active:scale-[0.98] " type="submit">
                        Access Private Ledger
                    </button>
                </div>

                <section>
                    <div class="flex items-center gap-4 py-2">
                        <div class="h-[1px] flex-grow bg-outline-variant/30"></div>
                        <span class="text-[10px] font-label uppercase tracking-widest text-on-surface-variant">
                            Secure Authentication
                        </span>
                        <div class="h-[1px] flex-grow bg-outline-variant/30"></div>
                    </div>
                    <div class="flex justify-center">
                        <button class="flex items-center gap-3 px-6 py-3 rounded-full
                        border border-outline-variant/20
                        bg-surface hover:bg-surface/80
                        dark:bg-surface-lowest dark:hover:bg-surface-lowest/80
                        transition-all duration-300 text-on-surface-variant group" type="button">

                            <span class="material-symbols-outlined text-secondary"
                                style="font-variation-settings: 'FILL' 1;">
                                fingerprint
                            </span>

                            <span class="text-xs font-label uppercase tracking-widest
                            group-hover:text-primary transition-colors">
                                Biometric Authentication
                            </span>
                        </button>
                    </div>
                </section>

            </form>
        </div>
    </div>
</main>
