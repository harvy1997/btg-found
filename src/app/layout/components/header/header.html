<!-- Top Header Global Navigation (Hidden on mobile) -->
<nav class="flex justify-between items-center w-full px-8 py-4 max-w-none sticky top-0 z-40
    bg-surface dark:bg-surface-lowest transition-colors">

    <div class="text-xl font-bold tracking-tighter
        text-primary dark:text-secondary">
        BTG Bank
    </div>

    <div class="flex items-center space-x-4">
        <div
            class="hidden md:flex items-center bg-surface-container/90 hover:bg-surface-container/20 dark:bg-surface-lowest/90 dark:hover:bg-surface-lowest/20 rounded-full border p-1 border-outline/15 dark:border-on-surface/15 transition-colors">
            <span
                class="material-symbols-outlined text-on-surface-variant dark:text-on-surface text-sm mr-2 px-2 py-2">search</span>
            <input class="bg-transparent border-none text-xs focus:ring-0 w-48 text-on-surface dark:text-on-surface p-1"
                placeholder="Search instruments..." type="text" />
        </div>
        <span
            class="material-symbols-outlined cursor-pointer
            text-primary hover:text-primary/80 dark:text-on-surface dark:hover:text-on-surface/80 transition-colors">notifications</span>
        <span
            class="material-symbols-outlined cursor-pointer
            text-primary hover:text-primary/80 dark:text-on-surface dark:hover:text-on-surface/80 transition-colors">account_circle</span>
    </div>
</nav>

<!-- BottomNavBar for Mobile -->
<nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pt-3 pb-8
    bg-surface/95 hover:bg-surface/80 dark:bg-surface-lowest/95 dark:hover:bg-surface-lowest/80 backdrop-blur-xl
    border-t border-outline/30 dark:border-on-surface/30
    shadow-[0_-10px_40px_rgba(28,28,26,0.05)] rounded-t-xl transition-colors">

    <a routerLink="/" [routerLinkActiveOptions]="{exact: true}"
        routerLinkActive="!text-secondary !scale-110 !opacity-100" class="flex flex-col items-center justify-center
        text-primary opacity-40 hover:opacity-80 hover:text-primary/80 transition-all
        dark:text-on-surface dark:opacity-40 dark:hover:opacity-80 dark:hover:text-on-surface/80">
        <span class="material-symbols-outlined">dashboard</span>
        <span class="font-manrope text-[10px] uppercase tracking-widest font-bold mt-1">Dash</span>
    </a>

    <a routerLink="/list" routerLinkActive="!text-secondary !scale-110 !opacity-100 dark:!text-secondary" class="flex flex-col items-center justify-center
        text-primary opacity-40 hover:opacity-80 transition-all
        dark:text-on-surface dark:opacity-40">
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
        <span class="font-manrope text-[10px] uppercase tracking-widest font-bold mt-1">Portfolio</span>
    </a>

    <a href="#" class="flex flex-col items-center justify-center
        text-primary opacity-40 hover:opacity-80 hover:text-primary/80 transition-opacity transition-colors
        dark:text-on-surface dark:opacity-40 dark:hover:opacity-80 dark:hover:text-on-surface/80">
        <span class="material-symbols-outlined">contacts</span>
        <span class="font-manrope text-[10px] uppercase tracking-widest font-bold mt-1">Direct</span>
    </a>

    <a href="#" class="flex flex-col items-center justify-center
        text-primary opacity-40 hover:opacity-80 hover:text-primary/80 transition-opacity transition-colors
        dark:text-on-surface dark:opacity-40 dark:hover:opacity-80 dark:hover:text-on-surface/80">
        <span class="material-symbols-outlined">history</span>
        <span class="font-manrope text-[10px] uppercase tracking-widest font-bold mt-1">Transact</span>
    </a>
</nav>
