<div class="bg-surface-container-low p-6 border-l-4 border-secondary">
    <div class="flex flex-col md:flex-row md:justify-between items-start mb-2 gap-2 md:gap-0">
        <h3 class="font-bold text-primary dark:text-white tracking-tight md:order-1 order-2">{{data()?.nombre}}</h3>
        <span
            class="text-[10px] bg-secondary/10 text-secondary px-2 py-1 font-bold rounded-md md:order-2 order-1">Inscrito</span>
    </div>
    <p class="text-2xl font-bold text-primary dark:text-white mb-1">{{data()?.monto | currency: 'USD'}}</p>
    <p class="text-xs text-on-surface-variant mb-6">{{data()?.categoria}}</p>
    <div class="flex justify-between items-center text-xs font-bold">
        <span class="text-secondary text-md cursor-pointer" (click)="openModal()">Cancelar suscripción</span>
        <span class="material-symbols-outlined text-secondary  text-md">arrow_forward_ios</span>
    </div>
</div>
