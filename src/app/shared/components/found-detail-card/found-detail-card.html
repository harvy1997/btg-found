<div class="md:flex items-center justify-between p-6 bg-surface dark:bg-surface-lowest hover:bg-primary/20 dark:hover:bg-surface-lowest/50 transition-all rounded-md"
    (click)="openModal()">
    <div class="flex items-center gap-6">
        <div class="w-12 h-12 flex items-center justify-center bg-primary-container/5 dark:bg-secondary/10 rounded-sm">
            <span class="material-symbols-outlined text-primary dark:text-secondary">
                corporate_fare
            </span>
        </div>
        <div>
            <h4 class="font-bold text-primary dark:text-secondary">
                {{data()?.nombre}}
            </h4>
            <p class="text-xs text-on-surface-variant dark:text-on-surface">
                {{data()?.categoria}}
            </p>
        </div>
    </div>
    <div class="text-right">
        <p class="font-bold text-secondary dark:text-on-surface">{{data()?.montoMinimo | currency: 'USD'}}</p>
        <p class="text-[10px] uppercase tracking-widest font-bold opacity-40">Mínimo</p>
    </div>
</div>
